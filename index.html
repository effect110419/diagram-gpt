<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagramGPT — AI генератор диаграмм</title>
    
    <!-- Шрифты -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts.css">
    
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- BPMN библиотеки -->
    <script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-navigated-viewer.development.js"></script>
    <script src="https://unpkg.com/bpmn-auto-layout@0.2.0/dist/bpmn-auto-layout.min.js"></script>
    
    <!-- Наш CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span class="logo">🤖</span>
                <h1>DiagramGPT</h1>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </div>
        </div>
        
        <p class="description">
            Опишите процесс — нейросеть создаст профессиональную BPMN-диаграмму
        </p>
        
        <div class="textarea-wrapper">
            <textarea 
                id="textInput" 
                placeholder="Например: Пользователь нажимает кнопку входа. Система проверяет логин и пароль. Если данные верны — открывается личный кабинет. Если нет — показывается ошибка."
                oninput="autoResize(this)"
            ></textarea>
        </div>
        
        <div class="controls">
            <div class="select-wrapper">
                <select id="diagramType">
                    <option value="bpmn">📊 BPMN (бизнес-процесс)</option>
                    <option value="uml">🔄 UML (в разработке)</option>
                    <option value="er">🗄️ ER (в разработке)</option>
                </select>
            </div>
            <button id="generateBtn">
                <i class="fas fa-magic"></i>
                Сгенерировать
            </button>
        </div>
        
        <!-- Контейнер для результата -->
        <div id="result">
            <div class="diagram-placeholder">
                <i class="fas fa-project-diagram"></i>
                <p>Введите текст и нажмите «Сгенерировать»</p>
            </div>
        </div>
        
        <small>⚡ Работает на AI · Профессиональная BPMN-нотация · Версия 1.0</small>
    </div>

    <!-- Наш JavaScript -->
    <script src="script.js"></script>
</body>
</html>
