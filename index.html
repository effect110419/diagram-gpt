<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UML Sequence Generator — PlantUML style</title>
    
    <!-- Шрифты и иконки -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span class="logo">🔄</span>
                <h1>UML Sequence Generator</h1>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </div>
        </div>
        
        <p class="description">
            Опишите взаимодействие — нейросеть создаст UML Sequence диаграмму в стиле PlantUML
        </p>
        
        <div class="textarea-wrapper">
            <textarea 
                id="textInput" 
                placeholder="Например: Пользователь нажимает кнопку входа. Система проверяет логин и пароль. Если данные верны — открывается личный кабинет. Если нет — показывается ошибка."
                oninput="autoResize(this)"
            ></textarea>
        </div>
        
        <button id="generateBtn" class="generate-btn">
            <i class="fas fa-magic"></i>
            Сгенерировать диаграмму
        </button>
        
        <!-- Результат -->
        <div id="result" class="result-container">
            <div class="placeholder">
                <i class="fas fa-arrow-up"></i>
                <p>Введите текст и нажмите «Сгенерировать»</p>
            </div>
        </div>
        
        <small>⚡ Генерация UML Sequence · PlantUML совместимость · Экспорт PNG</small>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/panzoom@9.4.3/dist/panzoom.min.js"></script>
    
    <!-- Наш скрипт -->
    <script src="script.js"></script>
</body>
</html>
