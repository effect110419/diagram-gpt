<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagramGPT</title>
    
    <!-- Шрифты -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts.css">
    
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- BPMN визуализация -->
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.11.1/dist/assets/diagram-js.css">
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.11.1/dist/assets/bpmn-font/css/bpmn-embedded.css">
    
    <!-- Наш CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span class="logo">🤖</span>
                <h1>DiagramGPT</h1>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </div>
        </div>
        
        <p class="description">
            Опишите процесс, архитектуру или модель данных — нейросеть превратит текст в профессиональную диаграмму
        </p>
        
        <div class="textarea-wrapper">
            <textarea 
                id="textInput" 
                placeholder="Например: Пользователь нажимает кнопку входа. Система проверяет логин и пароль. Если данные верны — открывается личный кабинет. Если нет — показывается ошибка."
                oninput="autoResize(this)"
            ></textarea>
        </div>
        
        <div class="controls">
            <div class="select-wrapper">
                <select id="diagramType">
                    <option value="bpmn">📊 BPMN (бизнес-процесс)</option>
                    <option value="uml">🔄 UML Sequence (взаимодействие)</option>
                    <option value="er">🗄️ ER Diagram (сущность-связь)</option>
                </select>
            </div>
            <button id="generateBtn">
                <i class="fas fa-magic"></i>
                Сгенерировать
            </button>
        </div>
        
        <!-- Контейнер для результата -->
        <div id="result">
            <!-- Здесь будет отображаться диаграмма -->
        </div>
        
        <small>⚡ Работает на AI · Диаграммы рисуются в реальном времени · Версия 0.3</small>
    </div>

    <!-- Библиотеки -->
    <script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-viewer.development.js"></script>
    
    <!-- Наш JavaScript -->
    <script src="script.js"></script>
</body>
</html>
