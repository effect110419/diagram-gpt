<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagramGPT</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; min-height: 200px; }
    </style>
</head>
<body>
    <h1>🤖 DiagramGPT</h1>
    <p>Опишите процесс текстом, и я покажу диаграмму:</p>
    
    <textarea id="textInput" placeholder="Например: Пользователь нажимает кнопку входа, система проверяет логин и пароль, если верно - пускает в кабинет, иначе показывает ошибку"></textarea>
    
    <button id="generateBtn">Сгенерировать</button>
    
    <div id="result">Здесь появится диаграмма</div>

    <script>
        // ПОКА ЭТО ТЕСТ БЕЗ БЭКЕНДА
        document.getElementById('generateBtn').addEventListener('click', function() {
            const text = document.getElementById('textInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!text.trim()) {
                alert('Введите текст');
                return;
            }
            
            // Просто показываем, что кнопка работает
            resultDiv.innerHTML = `
                <h3>✅ Текст получен</h3>
                <p>Вы написали: "${text}"</p>
                <p><small>Сейчас мы просто тестируем интерфейс. Позже здесь будет настоящая диаграмма от нейросети.</small></p>
            `;
        });
    </script>
</body>
</html>
